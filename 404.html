<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Stackly</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-illustration {
            animation: float 6s ease-in-out infinite;
            margin-bottom: 2rem;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="error-page">
    <!-- Stage Loader -->
    <div id="stage-loader" class="stage-loader">
        <div class="loader-content">
            <img src="assets/logo.webp" alt="Stackly Logo" class="loader-logo" width="100">
            <div class="loader-spinner">
                <svg viewBox="0 0 100 100" class="spinner-svg">
                    <circle cx="50" cy="50" r="40" class="spinner-track"></circle>
                    <circle cx="50" cy="50" r="40" class="spinner-active"></circle>
                </svg>
            </div>
            <p class="loader-text">Checking Page...</p>
        </div>
    </div>

    <!-- Error Content -->
    <div class="error-container">
        <div class="error-content">
            <a href="index.html" class="error-logo-link">
                <img src="assets/logo.webp" alt="Stackly" class="error-logo" width="50">
            </a>
            
            <div class="error-illustration">
                <svg viewBox="0 0 200 200" class="error-svg" width="250" height="250" style="margin:0 auto;display:block;">
                    <defs>
                        <linearGradient id="errorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#10b981" />
                            <stop offset="50%" stop-color="#3b82f6" />
                            <stop offset="100%" stop-color="#8b5cf6" />
                        </linearGradient>
                    </defs>
                    <circle cx="100" cy="100" r="80" fill="none" stroke="url(#errorGrad)" stroke-width="3" stroke-dasharray="15 10" opacity="0.8">
                        <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="15s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="100" cy="100" r="60" fill="none" stroke="url(#errorGrad)" stroke-width="2" stroke-dasharray="10 15" opacity="0.6">
                        <animateTransform attributeName="transform" type="rotate" from="360 100 100" to="0 100 100" dur="10s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="100" cy="100" r="40" fill="none" stroke="url(#errorGrad)" stroke-width="1.5" stroke-dasharray="5 10" opacity="0.4">
                        <animateTransform attributeName="transform" type="rotate" from="0 100 100" to="360 100 100" dur="5s" repeatCount="indefinite"/>
                    </circle>
                    <text x="100" y="115" text-anchor="middle" fill="url(#errorGrad)" font-size="52" font-weight="900" font-family="system-ui" style="filter: drop-shadow(0 0 15px rgba(139, 92, 246, 0.6));">404</text>
                </svg>
            </div>
            
            <h1 class="error-title">Page Not Found</h1>
            <p class="error-desc">Oops! The page you're looking for doesn't exist or has been moved. It might have been deleted, renamed, or the link you followed might be broken or outdated.</p>
            
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary btn-large">
                    <span class="btn-icon">←</span> Back to home
                </a>
                <button onclick="history.back()" class="btn btn-outline btn-large">Go back</button>
            </div>
            

        </div>
    </div>

    <!-- Error Footer -->
    <footer class="error-footer">
        <div class="error-footer-content">
            <p>© 2026 Stackly Learning Platform. All rights reserved.</p>
            <div class="error-footer-links">
                <a href="index.html">Home</a>
                <span>•</span>
                <a href="contact.html">Contact</a>
                <span>•</span>
                <a href="404.html">Help</a>
                <span>•</span>
                <a href="404.html">Sitemap</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
